<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://kit.fontawesome.com/c0843397ce.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="food.css" />
    <title>Food Delivery</title>
  </head>
  <body>
    <div class="parent">
      <div class="child1">
        <div class="1page">
          <main>
            <header>
              <span class="food">FOOD</span
              ><span class="delivery">DELIVERY</span>
            </header>
            <h1 class="login">Login</h1>
            <p>
              Sign in with your data that you entered during your registration.
            </p>
            <section class="labels">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="name@example.com" />

              <label for="password">Password</label>
              <input
                id="password"
                type="password"
                placeholder="min. 8 characters"
              />
              <div class="checkbox">
                <input class="ptsichka" type="checkbox" />
                <label>keep me logged in</label>
              </div>
              <button class="buttonlogin">Login</button>
              <div class="forgotpassword">
                Forgot password
                <p class="lastline">
                  Don’t have an account? <span> Sign up</span>
                </p>
              </div>
            </section>
          </main>
        </div>
      </div>
      <div class="child2">
        <div class="box1">
          <h3>Overall rating</h3>
          <p><span>4.2 <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i></span> <i class="fa-solid fa-star"></i></p>
        </div>
      </div>
    </div>
  </body>
</html>
